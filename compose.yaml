services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-econizhny}
      POSTGRES_USER: ${POSTGRES_USER:-econizhny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econizhny}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-econizhny} -d ${POSTGRES_DB:-econizhny}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      network: ${BACKEND_BUILD_NETWORK:-default}
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-15}
    entrypoint:
      [
        "sh",
        "-c",
      ]
    command:
      [
        "mkdir -p /app/runtime_logs /app/backups/db /app/backups/logs && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-3} --timeout 60 --log-level ${APP_LOG_LEVEL:-info} --access-logfile /app/runtime_logs/gunicorn_access.log --error-logfile /app/runtime_logs/gunicorn_error.log --capture-output",
      ]
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-econizhny-dev-secret-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DJANGO_SERVE_MEDIA: ${DJANGO_SERVE_MEDIA:-true}
      DJANGO_USE_S3_MEDIA: ${DJANGO_USE_S3_MEDIA:-false}
      POSTGRES_DB: ${POSTGRES_DB:-econizhny}
      POSTGRES_USER: ${POSTGRES_USER:-econizhny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econizhny}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_ACCESS_KEY_ID: ${AWS_S3_ACCESS_KEY_ID:-}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY:-}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-virtual}
      AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION:-s3v4}
      AWS_S3_VERIFY: ${AWS_S3_VERIFY:-}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-false}
      AWS_DEFAULT_ACL: ${AWS_DEFAULT_ACL:-}
      AWS_S3_OBJECT_ACL: ${AWS_S3_OBJECT_ACL:-}
      AWS_LOCATION: ${AWS_LOCATION:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
    ports:
      - "127.0.0.1:${API_BIND_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./runtime_logs:/app/runtime_logs
      - ./backups:/app/backups
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    restart: unless-stopped
    build:
      context: ../EcoDesman-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-13000}:3000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:3000 >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-eco-vyhuhol.local}
      API_DOMAIN: ${API_DOMAIN:-api.eco-vyhuhol.local}
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./runtime_logs:/var/log/nginx
      - ./runtime_cache:/var/cache/nginx
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/api/v1/health/ >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  backup:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      network: ${BACKEND_BUILD_NETWORK:-default}
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-15}
    entrypoint:
      [
        "sh",
        "-c",
      ]
    command:
      [
        "mkdir -p /app/backups/db /app/backups/logs /app/runtime_logs && python -m ops.backup_scheduler",
      ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-econizhny}
      POSTGRES_USER: ${POSTGRES_USER:-econizhny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econizhny}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      BACKUP_TIMEZONE: ${BACKUP_TIMEZONE:-Europe/Moscow}
      BACKUP_SCHEDULE_HOUR: ${BACKUP_SCHEDULE_HOUR:-3}
      BACKUP_SCHEDULE_MINUTE: ${BACKUP_SCHEDULE_MINUTE:-0}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-ops}
      BACKUP_S3_BUCKET_NAME: ${BACKUP_S3_BUCKET_NAME:-}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_ACCESS_KEY_ID: ${AWS_S3_ACCESS_KEY_ID:-}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY:-}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-virtual}
      AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION:-s3v4}
      AWS_S3_VERIFY: ${AWS_S3_VERIFY:-}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-false}
      AWS_DEFAULT_ACL: ${AWS_DEFAULT_ACL:-}
      AWS_S3_OBJECT_ACL: ${AWS_S3_OBJECT_ACL:-}
      AWS_LOCATION: ${AWS_LOCATION:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
      - ./runtime_logs:/app/runtime_logs

volumes:
  postgres_data:
  media_data:
  static_data:
