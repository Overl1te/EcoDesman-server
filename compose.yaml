services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-econizhny}
      POSTGRES_USER: ${POSTGRES_USER:-econizhny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econizhny}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-econizhny} -d ${POSTGRES_DB:-econizhny}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      [
        "sh",
        "-c",
      ]
    command:
      [
        "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-3} --timeout 60",
      ]
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-econizhny-dev-secret-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SERVE_MEDIA: ${DJANGO_SERVE_MEDIA:-true}
      POSTGRES_DB: ${POSTGRES_DB:-econizhny}
      POSTGRES_USER: ${POSTGRES_USER:-econizhny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econizhny}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  media_data:
  static_data:
